<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>剃刀 · DNA 防守复盘 | JARVIS × Shawn</title>
<style>
  :root {
    --bg:#0a0a0c; --card:rgba(22,22,26,0.88); 
    --text:#e8e8ed; --text2:#98989e; --text3:#5c5c63;
    --accent:#0af; --green:#00e676; --red:#ff3d3d; --orange:#ff9100;
    --border:rgba(255,255,255,0.06); --radius:16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
    padding:24px; min-height:100vh; -webkit-font-smoothing:antialiased; letter-spacing:-0.01em; line-height:1.55;
  }
  .navbar {
    position:sticky; top:0; z-index:100;
    backdrop-filter:blur(28px); background:rgba(10,10,12,0.78);
    border-bottom:1px solid var(--border);
    padding:14px 24px; margin:-24px -24px 24px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .navbar h1 { font-size:19px; font-weight:700; letter-spacing:-0.03em; }
  .navbar h1 span { background:linear-gradient(135deg,#e8e8ed 0%,#0af 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .nav-links a { font-size:12px; color:var(--accent); text-decoration:none; font-weight:600; }
  .section {
    background:var(--card); backdrop-filter:blur(20px);
    border:1px solid var(--border); border-radius:var(--radius);
    padding:22px 26px; margin-bottom:16px; max-width:1000px; margin-left:auto; margin-right:auto;
  }
  .section h2 { font-size:17px; font-weight:700; margin-bottom:16px; letter-spacing:-0.02em; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text3); padding:8px 10px; border-bottom:1px solid var(--border); }
  td { padding:10px 10px; border-bottom:1px solid rgba(255,255,255,0.03); font-variant-numeric:tabular-nums; }
  tr:last-child td { border-bottom:none; }
  .score-ok { color:var(--green); font-weight:700; }
  .score-warn { color:var(--orange); font-weight:700; }
  .score-bad { color:var(--red); font-weight:700; }
  .tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; letter-spacing:0.03em; }
  .tag-buy { background:rgba(0,170,255,0.15); color:var(--accent); }
  .tag-sell { background:rgba(255,61,61,0.15); color:var(--red); }
  .tag-hold { background:rgba(255,145,0,0.15); color:var(--orange); }
  .weight-fix { font-size:11px; color:var(--text3); margin-top:8px; padding:8px 12px; background:rgba(255,255,255,0.03); border-radius:8px; border-left:2px solid var(--accent); }
  .weight-fix strong { color:var(--text); }
  .empty { text-align:center; padding:40px; color:var(--text3); font-size:14px; }
  .empty small { display:block; margin-top:6px; font-size:12px; }
  .footer { text-align:center; padding:24px; font-size:12px; color:var(--text3); max-width:1000px; margin:0 auto; }
</style>
</head>
<body>

<div class="navbar">
  <h1>🛡️ <span>DNA · 防守复盘</span></h1>
  <div class="nav-links">
    <a href="index.html">← 仪表盘</a>
  </div>
</div>

<div class="section">
  <h2>🧬 DNA 评分对撞表</h2>
  <p style="font-size:13px;color:var(--text2);margin-bottom:16px">
    防守协议 v1：仅关注标的入场 DNA 评分 → 跌破 80 分清仓 → 持仓期间负面事件。气压计/竞价家数/全场涨停数等宏观指标已永久删除。
  </p>
  <table>
    <thead>
      <tr>
        <th>日期</th>
        <th>标的</th>
        <th>操作</th>
        <th>入场DNA</th>
        <th>离场DNA</th>
        <th>持仓天数</th>
        <th>盈亏</th>
        <th>负面事件</th>
        <th>权重修正</th>
      </tr>
    </thead>
    <tbody id="dna-table">
      <tr><td colspan="9" class="empty">等待数据同步…<br><small>每日15:30自动更新</small></td></tr>
    </tbody>
  </table>
</div>

<div class="section">
  <h2>⚖️ DNA 权重自省</h2>
  <p style="font-size:13px;color:var(--text2);margin-bottom:14px">
    如果某笔交易亏损，直接回答：是 DNA 模型里哪个维度给了错误权重？修正了什么？
  </p>
  <div id="weight-log">
    <div class="empty">暂无权重修正记录<br><small>出现亏损交易时自动写入</small></div>
  </div>
</div>

<div class="footer">
  JARVIS 自主决策 · DNA 防守协议 v1 · 对撞/气压计/进化已永久删除
</div>

<script>
(async () => {
  // Load trades for DNA analysis
  let trades = [];
  try {
    let r = await fetch('data/trades.json?' + Date.now());
    if (!r.ok) r = await fetch('https://raw.githubusercontent.com/yuanshao1983/trading-dashboard/main/data/trades.json');
    if (r.ok) {
      let d = await r.json();
      trades = d.trades || [];
    }
  } catch(e) {}

  // Load weight fixes if any
  let fixes = [];
  try {
    let r = await fetch('data/dna_weight_fixes.json?' + Date.now());
    if (r.ok) fixes = await r.json();
  } catch(e) {}

  // Render DNA table
  if (trades.length > 0) {
    document.getElementById('dna-table').innerHTML = trades.map((t,i) => {
      let entryScore = t.dna_entry || '—';
      let exitScore = t.dna_exit || '—';
      let event = t.negative_event || '—';
      let fix = t.weight_fix || '—';
      let pnl = t.pnl != null ? '¥'+t.pnl.toLocaleString() : '—';
      let pnlCls = t.pnl > 0 ? 'score-ok' : (t.pnl < 0 ? 'score-bad' : '');
      let opTag = t.buy_date && !t.sell_date ? 'tag-hold' : (t.sell_date ? 'tag-sell' : 'tag-buy');
      let opLabel = t.buy_date && !t.sell_date ? '持仓' : (t.sell_date ? '卖出' : '买入');
      
      return `<tr>
        <td>${t.buy_date||'—'}</td>
        <td><strong>${t.name||'—'}</strong> <span style="color:var(--text3)">${t.code||''}</span></td>
        <td><span class="tag ${opTag}">${opLabel}</span></td>
        <td class="${typeof entryScore === 'number' ? (entryScore >= 80 ? 'score-ok' : 'score-bad') : ''}">${entryScore}</td>
        <td class="${typeof exitScore === 'number' ? (exitScore >= 80 ? 'score-ok' : 'score-bad') : ''}">${exitScore}</td>
        <td>${t.holding_days||'—'}天</td>
        <td class="${pnlCls}">${pnl}</td>
        <td style="font-size:12px;color:var(--text2)">${event}</td>
        <td style="font-size:12px;color:var(--text2)">${fix}</td>
      </tr>`;
    }).join('');
  }

  // Render weight fixes
  if (fixes.length > 0) {
    document.getElementById('weight-log').innerHTML = fixes.map(f => `
      <div class="weight-fix">
        <strong>${f.date} · ${f.stock}</strong> — 
        维度「${f.dimension}」权重从 ${f.old_weight} → ${f.new_weight}<br>
        原因：${f.reason}
      </div>
    `).join('');
  }
})();
</script>

</body>
</html>
