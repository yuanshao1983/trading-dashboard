<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>剃刀 · 持仓仪表盘</title>
<style>
  :root {
    --bg:#0a0a0c; --card:rgba(22,22,26,0.88); --card2:rgba(28,28,34,0.92);
    --text:#e8e8ed; --text2:#98989e; --text3:#5c5c63;
    --accent:#0af; --green:#00e676; --red:#ff3d3d; --orange:#ff9100;
    --border:rgba(255,255,255,0.06); --radius:16px; --radius-sm:10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;
    padding:24px; min-height:100vh; -webkit-font-smoothing:antialiased; letter-spacing:-0.01em; line-height:1.55;
  }
  .navbar {
    position:sticky; top:0; z-index:100;
    backdrop-filter:blur(28px); background:rgba(10,10,12,0.78);
    border-bottom:1px solid var(--border);
    padding:14px 24px; margin:-24px -24px 24px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .navbar h1 { font-size:19px; font-weight:700; letter-spacing:-0.03em; }
  .navbar h1 span { background:linear-gradient(135deg,#e8e8ed 0%,#0af 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .nav-links a { font-size:12px; color:var(--accent); text-decoration:none; font-weight:600; }
  .container { max-width:960px; margin:0 auto; }
  
  /* Stat cards */
  .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .stat-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 20px; text-align:center;
  }
  .stat-card .label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--text3); margin-bottom:4px; }
  .stat-card .value { font-size:28px; font-weight:700; letter-spacing:-0.03em; }
  .stat-card .sub { font-size:11px; color:var(--text2); margin-top:2px; }
  .green { color:var(--green); } .red { color:var(--red); }
  
  /* Section */
  .section {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:22px 26px; margin-bottom:16px;
  }
  .section h2 { font-size:16px; font-weight:700; margin-bottom:16px; letter-spacing:-0.02em; display:flex; align-items:center; gap:8px; }
  .section h2 .badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; }
  .badge-danger { background:rgba(255,61,61,0.15); color:var(--red); }
  .badge-ok { background:rgba(0,230,118,0.15); color:var(--green); }
  
  /* Holdings table */
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text3); padding:8px 10px; border-bottom:1px solid var(--border); }
  td { padding:12px 10px; border-bottom:1px solid rgba(255,255,255,0.03); font-variant-numeric:tabular-nums; }
  tr:last-child td { border-bottom:none; }
  tr.danger { background:rgba(255,61,61,0.06); }
  tr.danger td:first-child { border-left:2px solid var(--red); padding-left:8px; }
  
  .dna-score { font-weight:700; font-size:15px; }
  .dna-danger { color:var(--red); }
  .dna-warn { color:var(--orange); }
  .dna-ok { color:var(--green); }
  
  .dim-badge {
    display:inline-block; padding:2px 6px; border-radius:6px; font-size:10px; font-weight:600;
    background:rgba(255,145,0,0.12); color:var(--orange); margin-left:4px;
  }
  
  .empty-state { text-align:center; padding:40px; color:var(--text3); }
  .empty-state .emoji { font-size:40px; margin-bottom:12px; }
  
  /* Footer */
  .footer { text-align:center; padding:24px; font-size:11px; color:var(--text3); }
  .footer a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>

<div class="navbar">
  <h1>🛡️ <span>剃刀 · 持仓仪表盘</span></h1>
  <div class="nav-links">
    <a href="pdca.html">DNA 防守复盘 →</a>
  </div>
</div>

<div class="container">

  <!-- Account Stats -->
  <div class="stat-grid" id="stats"></div>

  <!-- ═══ 持仓清单 (核心) ═══ -->
  <div class="section">
    <h2>
      📊 当前持仓
      <span class="badge" id="holding-badge"></span>
    </h2>
    <table>
      <thead>
        <tr>
          <th>标的</th>
          <th>持仓</th>
          <th>入场价</th>
          <th>现价</th>
          <th>盈亏</th>
          <th>DNA 评分</th>
          <th>最弱维度</th>
        </tr>
      </thead>
      <tbody id="holdings-body">
        <tr><td colspan="7" class="empty-state"><div class="emoji">📭</div>空仓 — 等待入场信号</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Trade History -->
  <div class="section">
    <h2>📋 交易记录</h2>
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>标的</th>
          <th>策略</th>
          <th>入场DNA</th>
          <th>离场DNA</th>
          <th>盈亏</th>
          <th>负面事件</th>
        </tr>
      </thead>
      <tbody id="trades-body">
        <tr><td colspan="7" class="empty-state">加载中…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer">
    <p>JARVIS 自主决策 · DNA 防守协议 v1 · 每日15:30自动更新 · <a href="pdca.html">DNA复盘中心</a></p>
    <p style="margin-top:4px" id="update-time"></p>
  </div>

</div>

<script>
(async () => {
  // Load data
  let holdings = null, trades = null;
  try {
    let r = await fetch('data/holdings_dna.json?' + Date.now());
    if (r.ok) holdings = await r.json();
  } catch(e) {}
  try {
    let r = await fetch('data/trades.json?' + Date.now());
    if (!r.ok) r = await fetch('https://raw.githubusercontent.com/yuanshao1983/trading-dashboard/main/data/trades.json');
    if (r.ok) trades = await r.json();
  } catch(e) {}

  // ═══ Account Stats ═══
  const acc = trades?.account || {};
  const stats = [
    {label:'当前净值', value:'¥' + (acc.current_value || 0).toLocaleString(), cls:''},
    {label:'累计盈亏', value:'¥' + (acc.total_pnl || 0).toLocaleString(), cls: (acc.total_pnl||0) >= 0 ? 'green' : 'red'},
    {label:'胜率', value:(acc.win_rate || 0) + '%', cls:'', sub: acc.win_count + '/' + acc.trade_count},
  ];
  document.getElementById('stats').innerHTML = stats.map(s =>
    `<div class="stat-card"><div class="label">${s.label}</div><div class="value ${s.cls}">${s.value}</div>${s.sub ? `<div class="sub">${s.sub}</div>` : ''}</div>`
  ).join('');

  // ═══ Holdings ═══
  if (holdings?.holdings?.length > 0) {
    const h = holdings.holdings;
    const below80 = h.filter(x => x.dna_below_80);
    document.getElementById('holding-badge').textContent = below80.length > 0
      ? `🚨 ${below80.length}只 < 80分`
      : `${h.length}只 ✅`;
    document.getElementById('holding-badge').className = 'badge ' + (below80.length > 0 ? 'badge-danger' : 'badge-ok');

    document.getElementById('holdings-body').innerHTML = h.map(pos => {
      const danger = pos.dna_below_80;
      const dnaCls = pos.dna_total >= 91 ? 'dna-ok' : (pos.dna_total >= 80 ? 'dna-warn' : 'dna-danger');
      const pnlCls = (pos.pnl_pct || 0) >= 0 ? 'green' : 'red';
      const worst = pos.worst_dimension;
      
      return `<tr class="${danger ? 'danger' : ''}">
        <td><strong>${pos.name}</strong> <span style="color:var(--text3)">${pos.code}</span></td>
        <td>${pos.shares}股<br><span style="font-size:11px;color:var(--text2)">¥${(pos.market_value||0).toLocaleString()}</span></td>
        <td>¥${pos.entry_price}</td>
        <td>¥${pos.current_price}</td>
        <td class="${pnlCls}" style="font-weight:600">${(pos.pnl_pct||0) >= 0 ? '+' : ''}${(pos.pnl_pct||0).toFixed(1)}%</td>
        <td><span class="dna-score ${dnaCls}">${pos.dna_total != null ? pos.dna_total : '—'}</span>${pos.dna_total != null ? '<span style="font-size:10px;color:var(--text3)">/115</span>' : ''}</td>
        <td>${worst ? `<span class="dim-badge">${worst.name} ${worst.score}/${worst.weight}</span>` : '—'}</td>
      </tr>`;
    }).join('');
  } else {
    document.getElementById('holding-badge').textContent = '空仓';
    document.getElementById('holding-badge').className = 'badge badge-ok';
  }

  // ═══ Trade History ═══
  if (trades?.trades?.length > 0) {
    document.getElementById('trades-body').innerHTML = trades.trades.slice().reverse().map(t => {
      const pnlCls = (t.pnl || 0) >= 0 ? 'green' : 'red';
      const entryDna = t.dna_entry != null ? t.dna_entry : '—';
      const exitDna = t.dna_exit != null ? t.dna_exit : '—';
      const event = t.negative_event || t.exit_reason || '—';
      return `<tr>
        <td>${t.buy_date || '—'}<br><span style="font-size:10px;color:var(--text3)">→ ${t.sell_date || '持仓中'}</span></td>
        <td><strong>${t.name}</strong> <span style="color:var(--text3)">${t.code}</span></td>
        <td>${t.strategy || '—'}</td>
        <td>${entryDna}</td>
        <td>${exitDna}</td>
        <td class="${pnlCls}" style="font-weight:600">¥${(t.pnl||0).toLocaleString()}</td>
        <td style="font-size:12px;color:var(--text2);max-width:200px">${event}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('update-time').textContent = '更新: ' + (trades?.updated || holdings?.timestamp || '—');
})();
</script>
</body>
</html>
