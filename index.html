<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trinity 控制台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f0f1a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;line-height:1.5}
  .container{max-width:1100px;margin:0 auto}
  h1{font-size:20px;color:#fff;margin-bottom:4px}
  .sub{color:#888;font-size:12px;margin-bottom:20px}

  .kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
  .kpi-card{background:#1a1a2e;border-radius:8px;padding:14px 18px;flex:1;min-width:140px;border-left:3px solid #333}
  .kpi-card .label{font-size:11px;color:#888;text-transform:uppercase;margin-bottom:4px}
  .kpi-card .value{font-size:22px;font-weight:700}
  .kpi-card .subv{font-size:12px;color:#666}

  .section{background:#1a1a2e;border-radius:8px;padding:18px 20px;margin-bottom:18px}
  .section h2{font-size:15px;color:#fff;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #2a2a3e}
  .section h3{font-size:13px;color:#aaa;margin:14px 0 8px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:#888;font-weight:500;font-size:11px;text-transform:uppercase;padding:8px 6px;border-bottom:1px solid #2a2a3e}
  td{padding:7px 6px;border-bottom:1px solid #1e1e32}
  tr:hover{background:rgba(255,255,255,0.02)}

  .up,.buy,.profit{color:#ef4444}
  .down,.sell,.loss{color:#22c55e}
  .badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
  .badge-sealed{background:rgba(239,68,68,0.15);color:#ef4444}
  .badge-failed{background:rgba(34,197,94,0.15);color:#22c55e}
  .badge-partial{background:rgba(234,179,8,0.15);color:#eab308}
  .badge-ok{background:rgba(34,197,94,0.12);color:#22c55e}
  .badge-warn{background:rgba(234,179,8,0.15);color:#eab308}
  .badge-meltdown{background:rgba(200,50,50,0.2);color:#ff6666}
  .badge-test{background:rgba(59,130,246,0.15);color:#3b82f6}

  .health-bar{padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:13px}
  .health-ok{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2)}
  .health-warn{background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.2)}
  .health-critical{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2)}

  .verdict{background:#16162a;border-radius:6px;padding:14px 16px;margin-top:12px}
  .verdict .title{font-size:12px;color:#888;margin-bottom:4px}
  .verdict .text{font-size:14px;color:#ddd}

  .empty-state{color:#555;font-style:italic;padding:20px 0;text-align:center;font-size:13px}
  .empty-big{color:#444;text-align:center;padding:30px 0;font-size:18px;font-weight:700}
  .macro-detail{font-size:11px;color:#777}

  .exec-row{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap}
  .exec-card{background:#16162a;border-radius:6px;padding:12px 16px;flex:1;min-width:120px;text-align:center}
  .exec-card .num{font-size:24px;font-weight:700}
  .exec-card .lbl{font-size:10px;color:#888;margin-top:2px}
  .exec-reason{font-size:12px;color:#999;padding:8px 12px;background:#16162a;border-radius:6px;margin-top:8px}
</style>
</head>
<body>
<div class="container">

<h1>⚡ Trinity 控制台</h1>
<div class="sub" id="ts">加载中...</div>

<div class="kpi-row">
  <div class="kpi-card"><div class="label">资产总额</div><div class="value" id="kp_total">-</div></div>
  <div class="kpi-card"><div class="label">可用现金</div><div class="value" id="kp_cash">-</div></div>
  <div class="kpi-card"><div class="label">累计盈亏</div><div class="value" id="kp_pnl">-</div><div class="subv" id="kp_pnlpct"></div></div>
  <div class="kpi-card"><div class="label">交易统计</div><div class="value" id="kp_trades">-</div><div class="subv" id="kp_winrate"></div></div>
</div>

<!-- ═══ POSITIONS ═══ -->
<div class="section">
  <h2>📊 当前持仓</h2>
  <div id="pos_body"></div>
</div>

<!-- ═══ EXECUTION MONITOR ═══ -->
<div class="section" id="exec_section">
  <h2>🎯 执行率监控</h2>
  <div id="exec_body"></div>
</div>

<!-- ═══ TRADE HISTORY ═══ -->
<div class="section">
  <h2>📋 交易记录</h2>
  <div id="hist_body"></div>
</div>

<!-- ═══ COLLISION CENTER ═══ -->
<div class="section">
  <h2>⚔️ 决策对撞表</h2>
  <div id="health_bar"></div>
  <div id="collision_body"></div>
</div>

<!-- ═══ MACRO ═══ -->
<div class="section">
  <h2>🌍 宏观环境对撞</h2>
  <div id="macro_body"></div>
</div>

<!-- ═══ EVOLUTION ═══ -->
<div class="section">
  <h2>🧬 进化日志</h2>
  <div id="evo_body"></div>
</div>

</div>

<script>
function el(id){return document.getElementById(id)}
function fmt(n,d){if(typeof n!=='number'||isNaN(n))return'-';return n.toFixed(d||0)}
function pct(n){if(typeof n!=='number'||isNaN(n))return'-';return(n>=0?'+':'')+n.toFixed(2)+'%'}
function updown(v){if(typeof v!=='number'||isNaN(v))return'';return v>=0?'up':'down'}
function pnlClass(v){if(typeof v!=='number'||isNaN(v))return'';return v>=0?'profit':'loss'}

function buildPositions(d){
  var pos=d.positions||[],acct=d.account||{},html='';
  if(!pos.length){
    if(acct.is_empty) html='<div class="empty-big">空仓</div><div class="empty-state">所有持仓已清空 · 等待下一次出击</div>';
    else html='<div class="empty-state">空仓 — 等待出击</div>';
  }else{
    html='<table><thead><tr><th>代码</th><th>名称</th><th>成本</th><th>股数</th><th>来源</th></tr></thead><tbody>';
    for(var i=0;i<pos.length;i++){var p=pos[i];
      html+='<tr><td>'+p.symbol+'</td><td>'+(p.name||'')+'</td><td>'+fmt(p.cost,2)+'</td><td>'+p.shares+'</td><td>'+(p.source||'')+'</td></tr>'}
    html+='</tbody></table>'}
  el('pos_body').innerHTML=html}

function buildExecution(d){
  var cc=d.collision_center||{},em=cc.execution_monitor||{},html='';
  var sn=em.sniper_count||0,ex=em.executed_count||0;
  var rcls=sn>0&&ex===0?'badge-warn':'badge-ok';
  html+='<div class="exec-row">'+
    '<div class="exec-card"><div class="num" style="color:#3b82f6">'+sn+'</div><div class="lbl">狙击候选(≥85分)</div></div>'+
    '<div class="exec-card"><div class="num '+ (ex>0?'profit':'') +'">'+ex+'</div><div class="lbl">实际执行</div></div>'+
    '<div class="exec-card"><div class="num" style="color:'+(sn>0&&ex===0?'#ef4444':'#22c55e')+'">'+((em.execution_rate||0)*100).toFixed(0)+'%</div><div class="lbl">执行率</div></div>'+
    '</div>';
  if(sn>0&&ex===0){
    html+='<div class="exec-reason"><strong>⚠ 偏离原因:</strong> ';
    var reasons=em.deviation_reasons||[];
    for(var i=0;i<reasons.length;i++) html+=reasons[i]+'；';
    html+='</div>';
  }else if(sn===0){
    html+='<div class="exec-reason">今日无狙击候选 — Predator扫描未发现≥85分标的</div>';
  }else{
    html+='<div class="exec-reason">✅ 狙击候选全部执行</div>';
  }
  el('exec_body').innerHTML=html}

function buildHistory(d){
  var hist=d.history||[],html='';
  if(!hist.length){html='<div class="empty-state">暂无交易记录</div>'}
  else{html='<table><thead><tr><th>日期</th><th>代码</th><th>名称</th><th>方向</th><th>价格</th><th>数量</th><th>金额</th><th>盈亏</th></tr></thead><tbody>';
  for(var i=0;i<hist.length;i++){var h=hist[i],cls=h.side==='买入'?'buy':(h.pnl>=0?'profit':'loss');
    html+='<tr><td>'+h.date+'</td><td>'+h.symbol+'</td><td>'+(h.name||'')+'</td><td class="'+(h.side==='买入'?'buy':'sell')+'">'+h.side+'</td><td>'+fmt(h.price,2)+'</td><td>'+h.qty+'</td><td>'+fmt(h.amount,2)+'</td><td class="'+cls+'">'+(h.pnl!==0?pct(h.pnl):'-')+'</td></tr>'}
  html+='</tbody></table>'}
  el('hist_body').innerHTML=html}

function buildCollision(d){
  var cc=d.collision_center||{},daily=cc.daily||[],all=cc.daily_all||[],html='';
  if(!cc.has_trades_today){
    html='<div class="empty-big">今日无执行交易</div><div class="empty-state">无实盘成交→无对撞数据。候选≠实盘。</div>';
  }else if(!daily.length){
    html='<div class="empty-state">无今日对撞记录</div>';
  }else{
    html='<table><thead><tr><th>日期</th><th>标的</th><th>买入价</th><th>卖出价</th><th>收益%</th><th>结果</th><th>偏差</th><th>来源</th></tr></thead><tbody>';
    for(var i=0;i<daily.length;i++){var c=daily[i],
      rcls=c.result==='sealed'?'badge-sealed':(c.result==='failed'?'badge-failed':'badge-partial'),
      rlabel=c.result==='sealed'?'封板':(c.result==='failed'?'止损':'微利');
      html+='<tr><td>'+c.date+'</td><td>'+c.symbol+' '+(c.name||'')+'</td><td>'+fmt(c.buy_price,2)+'</td><td>'+fmt(c.sell_price,2)+'</td><td class="'+updown(c.ret_pct)+'">'+pct(c.ret_pct)+'</td><td><span class="badge '+rcls+'">'+rlabel+'</span></td><td>'+(c.deviation_label||'')+'</td><td>'+(c.source||'razor')+'</td></tr>'}
    html+='</tbody></table>'}

  // Add all-time summary
  if(all.length>0){
    var sealed=0,failed=0,totalpnl=0;
    for(var i=0;i<all.length;i++){if(all[i].result==='sealed')sealed++;if(all[i].result==='failed')failed++;totalpnl+=all[i].pnl||0}
    html+='<div class="verdict" style="margin-top:12px"><div class="title">全量统计('+all.length+'笔实盘)</div><div class="text">盈利 <strong class="profit">'+sealed+'</strong> | 亏损 <strong class="loss">'+failed+'</strong> | 累计盈亏 <strong class="'+(totalpnl>=0?'profit':'loss')+'">'+(totalpnl>=0?'+':'')+totalpnl.toFixed(0)+'元</strong></div></div>';
  }

  el('collision_body').innerHTML=html}

function buildHealth(d){
  var h=d.collision_center.system_health||{};
  if(!h.status)return;
  var cls=h.status==='ok'?'health-ok':(h.status==='critical'?'health-critical':'health-warn');
  el('health_bar').innerHTML='<div class="health-bar '+cls+'"><strong>'+(h.level||'')+' '+h.diagnosis+'</strong>'+(h.warning?' — '+h.warning:'')+'</div>'}

function buildMacro(d){
  var macro=(d.collision_center||{}).macro||[],html='';
  if(!macro.length){el('macro_body').innerHTML='<div class="empty-state">无宏观数据</div>';return}
  html='<table><thead><tr><th>日期</th><th>预测竞价</th><th>实际</th><th>预测开盘</th><th>实际</th><th>判定</th><th>封板</th><th>执行</th><th>归因</th></tr></thead><tbody>';
  for(var i=0;i<macro.length;i++){var m=macro[i],vc=m.verdict.indexOf('🟢')===0?'badge-ok':(m.verdict.indexOf('🔴')===0?'badge-meltdown':'badge-warn');
    html+='<tr><td>'+m.date+'</td><td>'+m.pred_bid_range+'</td><td>'+m.actual_bid+'</td><td>'+m.pred_open+'</td><td>'+m.actual_open+'</td><td><span class="badge '+vc+'">'+m.verdict.substring(0,18)+'</span></td><td>'+m.sealed_count+'</td><td>'+m.trades_executed+'</td><td style="font-size:11px">'+m.attribution+'</td></tr>'}
  html+='</tbody></table>';
  el('macro_body').innerHTML=html}

function buildEvolution(d){
  var evo=d.evolution_center||{},params=evo.parameter_log||[],html='';
  if(evo.weekly_verdict){var wv=evo.weekly_verdict;
    html+='<div class="verdict" style="margin-bottom:14px"><div class="title">'+wv.period+' 本周策略结论</div><div class="text">'+wv.verdict+' | 变更'+wv.param_changes+'项 | '+wv.next_focus+'</div></div>'}
  if(!params.length){html+='<div class="empty-state">暂无参数调整</div>'}
  else{html+='<table><thead><tr><th>日期</th><th>模块</th><th>调整前</th><th>调整后</th><th>状态</th><th>效果</th></tr></thead><tbody>';
  for(var i=params.length-1;i>=0;i--){var p=params[i],sc=p.status.indexOf('生效')>=0?'badge-ok':'badge-test';
    html+='<tr><td>'+p.date+'</td><td>'+p.module+'</td><td style="font-size:11px;color:#999">'+(p.param_before||'')+'</td><td style="font-size:11px;color:#ddd">'+(p.param_after||'')+'</td><td><span class="badge '+sc+'">'+p.status+'</span></td><td style="font-size:11px;color:#999">'+(p.effect||'')+'</td></tr>'}
  html+='</tbody></table>'}
  el('evo_body').innerHTML=html}

function update(){
  var x=new XMLHttpRequest();
  x.open('GET','./dashboard_data.json?t='+Date.now(),true);
  x.onload=function(){
    if(x.status!==200){el('ts').innerText='加载失败,重试...';return}
    try{var d=JSON.parse(x.responseText)}catch(e){el('ts').innerText='JSON解析失败';return}
    el('ts').innerText='数据: '+(d.ts||'')+' | 对撞=实盘交易 | 交易日历已激活';
    var a=d.account||{};
    el('kp_total').innerText='¥'+fmt(a.total_assets,2);
    el('kp_cash').innerText='¥'+fmt(a.cash,2);
    el('kp_pnl').innerHTML=(a.total_pnl>=0?'+':'')+fmt(a.total_pnl,2);
    el('kp_pnl').className='value '+pnlClass(a.total_pnl);
    el('kp_pnlpct').innerText='总收益 '+pct(a.total_pnl_pct);
    el('kp_pnlpct').className='subv '+pnlClass(a.total_pnl_pct);
    el('kp_trades').innerText=(a.trade_count||0)+'笔';
    el('kp_winrate').innerText='胜率 '+((a.win_rate||0)*100).toFixed(0)+'% ('+a.win_count+'胜)';
    buildPositions(d);buildExecution(d);buildHistory(d);buildCollision(d);buildHealth(d);buildMacro(d);buildEvolution(d)
  };
  x.onerror=function(){el('ts').innerText='连接失败,重试...'};x.send()
}
update();setInterval(update,60000)
</script>
</body>
</html>
