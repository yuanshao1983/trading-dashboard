<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trinity 控制台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f0f1a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;line-height:1.5}
  .container{max-width:1100px;margin:0 auto}
  h1{font-size:20px;color:#fff;margin-bottom:4px}
  .sub{color:#888;font-size:12px;margin-bottom:20px}

  .kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
  .kpi-card{background:#1a1a2e;border-radius:8px;padding:14px 18px;flex:1;min-width:140px;border-left:3px solid #333}
  .kpi-card .label{font-size:11px;color:#888;text-transform:uppercase;margin-bottom:4px}
  .kpi-card .value{font-size:22px;font-weight:700}
  .kpi-card .subv{font-size:12px;color:#666}

  .section{background:#1a1a2e;border-radius:8px;padding:18px 20px;margin-bottom:18px}
  .section h2{font-size:15px;color:#fff;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #2a2a3e}
  .section h3{font-size:13px;color:#aaa;margin:14px 0 8px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:#888;font-weight:500;font-size:11px;text-transform:uppercase;padding:8px 6px;border-bottom:1px solid #2a2a3e}
  td{padding:7px 6px;border-bottom:1px solid #1e1e32}
  tr:hover{background:rgba(255,255,255,0.02)}

  .up,.buy,.profit{color:#ef4444}
  .down,.sell,.loss{color:#22c55e}
  .badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
  .badge-up{background:rgba(239,68,68,0.15);color:#ef4444}
  .badge-down{background:rgba(34,197,94,0.15);color:#22c55e}
  .badge-sealed{background:rgba(239,68,68,0.15);color:#ef4444}
  .badge-meltdown{background:rgba(200,50,50,0.2);color:#ff6666}
  .badge-ok{background:rgba(34,197,94,0.12);color:#22c55e}
  .badge-warn{background:rgba(234,179,8,0.15);color:#eab308}
  .badge-test{background:rgba(59,130,246,0.15);color:#3b82f6}

  .health-bar{padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:13px}
  .health-ok{background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2)}
  .health-warn{background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.2)}
  .health-critical{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2)}

  .verdict{background:#16162a;border-radius:6px;padding:14px 16px;margin-top:12px}
  .verdict .title{font-size:12px;color:#888;margin-bottom:4px}
  .verdict .text{font-size:14px;color:#ddd}

  .empty-state{color:#555;font-style:italic;padding:20px 0;text-align:center;font-size:13px}
  .macro-detail{font-size:11px;color:#777;margin-top:2px}
</style>
</head>
<body>
<div class="container">

<h1>⚡ Trinity 交易控制台</h1>
<div class="sub" id="ts">加载中...</div>

<div class="kpi-row">
  <div class="kpi-card"><div class="label">资产总额</div><div class="value" id="kp_total">-</div></div>
  <div class="kpi-card"><div class="label">可用现金</div><div class="value" id="kp_cash">-</div></div>
  <div class="kpi-card"><div class="label">累计盈亏</div><div class="value" id="kp_pnl">-</div><div class="subv" id="kp_pnlpct"></div></div>
  <div class="kpi-card"><div class="label">交易统计</div><div class="value" id="kp_trades">-</div><div class="subv" id="kp_winrate"></div></div>
</div>

<div class="section">
  <h2>📊 当前持仓</h2>
  <div id="pos_body"></div>
</div>

<div class="section">
  <h2>📋 交易记录</h2>
  <div id="hist_body"></div>
</div>

<div class="section">
  <h2>⚔️ 对撞中心</h2>
  <div id="health_bar"></div>
  <h3>🌍 宏观环境对撞</h3>
  <div id="macro_body"></div>
  <h3>🎯 个股决策对撞表</h3>
  <div id="collision_body"></div>
  <div id="weekly_summary"></div>
</div>

<div class="section">
  <h2>🧬 进化日志</h2>
  <div id="evo_body"></div>
</div>

</div>

<script>
function el(id){return document.getElementById(id)}
function fmt(n,d){if(typeof n!=='number'||isNaN(n))return'-';return n.toFixed(d||0)}
function pct(n){if(typeof n!=='number'||isNaN(n))return'-';return(n>=0?'+':'')+n.toFixed(2)+'%'}
function updown(v){if(typeof v!=='number'||isNaN(v))return'';return v>=0?'up':'down'}
function pnlClass(v){if(typeof v!=='number'||isNaN(v))return'';return v>=0?'profit':'loss'}

function buildPositions(data){
  var pos=data.positions||[],html='';
  if(!pos.length){html='<div class="empty-state">空仓 — 等待下一次出击</div>'}
  else{html='<table><thead><tr><th>代码</th><th>名称</th><th>成本</th><th>现价</th><th>股数</th><th>盈亏%</th><th>盈亏额</th><th>来源</th></tr></thead><tbody>';
  for(var i=0;i<pos.length;i++){var p=pos[i],cls=pnlClass(p.pnl_pct);
    html+='<tr><td>'+p.symbol+'</td><td>'+(p.name||'')+'</td><td>'+fmt(p.cost,2)+'</td><td>'+fmt(p.current,2)+'</td><td>'+p.shares+'</td><td class="'+cls+'">'+pct(p.pnl_pct)+'</td><td class="'+cls+'">'+fmt(p.pnl_amt,2)+'</td><td>'+(p.source||'')+'</td></tr>'}
  html+='</tbody></table>'}
  el('pos_body').innerHTML=html}

function buildHistory(data){
  var hist=data.history||[],html='';
  if(!hist.length){html='<div class="empty-state">暂无交易记录</div>'}
  else{html='<table><thead><tr><th>日期</th><th>代码</th><th>名称</th><th>方向</th><th>价格</th><th>数量</th><th>金额</th><th>盈亏</th></tr></thead><tbody>';
  for(var i=0;i<hist.length;i++){var h=hist[i],cls=h.side==='买入'?'buy':(h.pnl>=0?'profit':'loss');
    html+='<tr><td>'+h.date+'</td><td>'+h.symbol+'</td><td>'+(h.name||'')+'</td><td class="'+(h.side==='买入'?'buy':'sell')+'">'+h.side+'</td><td>'+fmt(h.price,2)+'</td><td>'+h.qty+'</td><td>'+fmt(h.amount,2)+'</td><td class="'+cls+'">'+(h.pnl?pct(h.pnl):'-')+'</td></tr>'}
  html+='</tbody></table>'}
  el('hist_body').innerHTML=html}

function buildMacro(data){
  var macro=data.macro||[],html='';
  if(!macro.length){html='<div class="empty-state">无宏观对撞数据</div>'}
  else{html='<table><thead><tr><th>日期</th><th>预测竞价</th><th>实际竞价</th><th>预测开盘</th><th>实际开盘</th><th>判定</th><th>封板</th><th>归因</th></tr></thead><tbody>';
  for(var i=0;i<macro.length;i++){var m=macro[i],vcls=m.verdict.indexOf('🟢')===0?'badge-ok':(m.verdict.indexOf('🔴')===0?'badge-meltdown':'badge-warn');
    html+='<tr><td>'+m.date+'</td><td>'+m.pred_bid_range+'</td><td>'+m.actual_bid+'</td><td>'+m.pred_open+'</td><td>'+m.actual_open+'</td><td><span class="badge '+vcls+'">'+m.verdict.substring(0,16)+'</span></td><td>'+m.sealed_count+'</td><td><span class="macro-detail">'+m.attribution+'</span></td></tr>'}
  html+='</tbody></table>'}
  el('macro_body').innerHTML=html}

function buildCollision(data){
  var daily=data.daily_all||data.daily||[],html='';
  if(!daily.length){html='<div class="empty-state">无对撞记录</div>'}
  else{html='<table><thead><tr><th>日期</th><th>标的</th><th>预测分</th><th>竞价%</th><th>实际%</th><th>结果</th><th>偏差类型</th><th>详情/归因</th></tr></thead><tbody>';
  for(var i=0;i<daily.length;i++){var c=daily[i],
    rcls=c.result==='sealed'?'badge-sealed':(c.result==='meltdown'?'badge-meltdown':(c.result==='failed'?'badge-down':'badge-warn')),
    rlabel=c.result==='sealed'?'封板':(c.result==='meltdown'?'熔断':(c.result==='failed'?'失败':(c.result==='no_signal'?'无信号':c.result)));
    html+='<tr><td>'+c.date+'</td><td>'+(c.symbol||'—')+' '+(c.name||'')+'</td><td>'+(c.predicted_score||'-')+'</td><td>'+(c.auction_pct?pct(c.auction_pct):'-')+'</td><td class="'+updown(c.actual_pct)+'">'+(c.actual_pct?pct(c.actual_pct):'-')+'</td><td><span class="badge '+rcls+'">'+rlabel+'</span></td><td>'+(c.deviation_label||'')+'</td><td><span class="macro-detail">'+(c.deviation_detail||'')+'</span></td></tr>'}
  html+='</tbody></table>'}
  el('collision_body').innerHTML=html}

function buildHealth(data){
  var health=data.system_health||{};
  if(!health.status)return;
  var barCls=health.status==='ok'?'health-ok':(health.status==='critical'?'health-critical':'health-warn');
  el('health_bar').innerHTML='<div class="health-bar '+barCls+'"><strong>'+(health.level||'')+' 系统: '+(health.warning||health.diagnosis||health.status)+'</strong>'+(health.action?' — '+health.action:'')+'</div>'}

function buildWeekly(data){
  var ws=data.weekly_summary||{};
  if(!ws.period)return;
  var hitCls=ws.hit_rate>=0.5?'profit':(ws.hit_rate>=0.3?'':'loss');
  el('weekly_summary').innerHTML='<div class="verdict"><div class="title">'+ws.period+' 周度统计</div><div class="text">对撞 '+ws.total+' | 命中 <strong class="'+hitCls+'">'+(ws.hit_count||0)+'</strong> | 命中率 <strong class="'+hitCls+'">'+((ws.hit_rate||0)*100).toFixed(0)+'%</strong>'+(ws.top_deviation_type!=='none'?' | 偏差: '+(ws.top_deviation_label||''):'')+'</div></div>'}

function buildEvolution(data){
  var evo=data.evolution_center||{},params=evo.parameter_log||[],html='';
  if(evo.weekly_verdict){var wv=evo.weekly_verdict;
    html+='<div class="verdict" style="margin-bottom:14px"><div class="title">'+wv.period+' 本周策略有效性结论</div><div class="text">'+(wv.verdict||'')+' | 变更'+wv.param_changes+'项 | '+wv.next_focus+'</div></div>'}
  if(!params.length){html+='<div class="empty-state">暂无参数调整记录</div>'}
  else{html+='<table><thead><tr><th>日期</th><th>模块</th><th>调整前</th><th>调整后</th><th>原因</th><th>状态</th><th>效果</th></tr></thead><tbody>';
  for(var i=params.length-1;i>=0;i--){var p=params[i],scls=p.status.indexOf('生效')>=0?'badge-ok':'badge-test';
    html+='<tr><td>'+p.date+'</td><td>'+p.module+'</td><td style="font-size:11px;color:#999">'+(p.param_before||'')+'</td><td style="font-size:11px;color:#ddd">'+(p.param_after||'')+'</td><td style="font-size:11px;max-width:180px">'+(p.reason||'')+'</td><td><span class="badge '+scls+'">'+p.status+'</span></td><td style="font-size:11px;color:#999">'+(p.effect||'')+'</td></tr>'}
  html+='</tbody></table>'}
  el('evo_body').innerHTML=html}

function update(){
  var x=new XMLHttpRequest();
  x.open('GET','./dashboard_data.json?t='+Date.now(),true);
  x.onload=function(){
    if(x.status!==200){el('ts').innerText='加载失败,重试中...';return}
    var d=JSON.parse(x.responseText);
    el('ts').innerText='数据: '+(d.ts||'')+' | 交易日历过滤已激活 | 回溯补齐06.01-06.08';
    var a=d.account||{};
    el('kp_total').innerText='¥'+fmt(a.total_assets,2);
    el('kp_cash').innerText='¥'+fmt(a.cash,2);
    el('kp_pnl').innerHTML=(a.total_pnl>=0?'+':'')+fmt(a.total_pnl,2);
    el('kp_pnl').className='value '+pnlClass(a.total_pnl);
    el('kp_pnlpct').innerText='总收益率 '+pct(a.total_pnl_pct);
    el('kp_pnlpct').className='subv '+pnlClass(a.total_pnl_pct);
    el('kp_trades').innerText=(a.trade_count||0)+'笔';
    el('kp_winrate').innerText='胜率 '+((a.win_rate||0)*100).toFixed(0)+'%';
    buildPositions(d);buildHistory(d);
    var cc=d.collision_center||{};
    buildHealth(cc);buildMacro(cc);buildCollision(cc);buildWeekly(cc);
    buildEvolution(d)};
  x.onerror=function(){el('ts').innerText='连接失败'} ;x.send()}
update();setInterval(update,60000)
</script>
</body>
</html>
